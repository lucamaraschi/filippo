name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/cli/package-lock.json

      - name: Install CLI dependencies
        run: npm install --workspace=packages/cli

      - name: Run CLI checks
        run: make cli-check

      - name: Build Swift daemon
        run: make app-check

      - name: Run Swift tests
        run: make app-test
